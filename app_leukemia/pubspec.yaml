name: leukemia_check
description: "On-device leukemia (ALL) blood-smear cell classifier (educational)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # On-device inference + image decoding. Same stack as the MoleCheck app.
  tflite_flutter: ^0.12.1
  image: ^4.3.0

  # Remember that onboarding has been shown.
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  adaptive_icon_background: "#AD1457"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  ios: true
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/leukemia_classifier.tflite
    - assets/labels.txt
    - assets/leukemia_samples.json
    - assets/cells/
